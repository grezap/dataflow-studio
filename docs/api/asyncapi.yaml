asyncapi: 3.0.0
info:
  title: DataFlow Studio — CDC Streams
  version: 0.4.0
  description: >
    Kafka topics in the DataFlow Studio pipeline (E14 / E16). SQL Server CDC on OltpDb is captured by
    Debezium into raw JSON topics; the .NET curation worker (Ingestion module) reshapes those into
    clean domain events serialized as Avro via the Schema Registry (ADR-0003, ADR-0004, ADR-0007).
    Week 3 covers all ten order-flow entities. The per-entity curated Avro schema is generated from
    the curation catalog (one spec per entity) and registered under the `<topic>-value` subject —
    that Schema Registry subject is the runtime source of truth; this spec documents the channels and
    the shared envelope. Every raw topic is `oltp.OltpDb.dbo.<Table>`; every curated topic is
    `dfs.<entity>.changed.v1`.

    The `dfs.telemetry.*` channels carry the pipeline's own self-observation (ADR-0008). They are
    deliberately **JSON, not Avro**: ClickHouse Kafka-engine source tables consume them natively as
    `JSONEachRow`, so their property names mirror the ClickHouse columns one-for-one and no Schema
    Registry lookup sits on that path.
  license:
    name: MIT
    url: https://github.com/grezap/dataflow-studio/blob/main/LICENSE
servers:
  kafka-east:
    host: 192.168.10.21:9092
    protocol: kafka-secure
    description: >
      Primary KRaft cluster (mutual TLS; brokers advertise the backplane 192.168.10.21-23:9092).
      Schema Registry at 192.168.70.91:8081. Clients present a Vault-issued mTLS cert and hold
      least-privilege ACLs.
defaultContentType: application/json
channels:
  rawCustomers:
    address: oltp.OltpDb.dbo.Customers
    description: >
      Raw CDC for dbo.Customers, produced by the Debezium SQL Server connector 'oltp-cdc'. JSON
      Debezium envelope (before/after/source/op). Topic name = <topic.prefix>.<db>.<schema>.<table>.
    messages:
      customerCdc:
        $ref: '#/components/messages/DebeziumCustomerEnvelope'
  curatedCustomerChanged:
    address: dfs.customers.changed.v1
    description: >
      Curated domain event for a customer change, produced by the .NET curation worker. Avro, schema
      registered under subject 'dfs.customers.changed.v1-value'. This is the contract downstream
      consumers (StarRocks dwh, ClickHouse analytics) bind to. It is the fully-documented exemplar;
      the nine channels below follow the same shape (business fields + the shared envelope).
    messages:
      customerChanged:
        $ref: '#/components/messages/CustomerChanged'
  # The remaining order-flow curated channels. Each carries an entity-specific record plus the shared
  # operation/sourceTsMs/curatedAtUtc envelope; the authoritative schema is the '<address>-value'
  # Schema Registry subject, generated from the curation catalog.
  curatedProductCategoryChanged:
    address: dfs.product-categories.changed.v1
    description: Curated product-category change (feeds dwh.dim_product category names).
    messages: { change: { $ref: '#/components/messages/CuratedOrderFlowChange' } }
  curatedProductChanged:
    address: dfs.products.changed.v1
    description: Curated product change (feeds SCD2 dwh.dim_product).
    messages: { change: { $ref: '#/components/messages/CuratedOrderFlowChange' } }
  curatedWarehouseChanged:
    address: dfs.warehouses.changed.v1
    description: Curated warehouse change (feeds dwh.dim_warehouse).
    messages: { change: { $ref: '#/components/messages/CuratedOrderFlowChange' } }
  curatedCustomerAddressChanged:
    address: dfs.customer-addresses.changed.v1
    description: Curated address change (enriches fact_order billing/shipping).
    messages: { change: { $ref: '#/components/messages/CuratedOrderFlowChange' } }
  curatedOrderChanged:
    address: dfs.orders.changed.v1
    description: Curated order change (feeds dwh.fact_order).
    messages: { change: { $ref: '#/components/messages/CuratedOrderFlowChange' } }
  curatedOrderLineChanged:
    address: dfs.order-lines.changed.v1
    description: Curated order-line change (feeds dwh.fact_order_line).
    messages: { change: { $ref: '#/components/messages/CuratedOrderFlowChange' } }
  curatedTransactionChanged:
    address: dfs.transactions.changed.v1
    description: Curated payment-transaction change (feeds dwh.fact_transaction).
    messages: { change: { $ref: '#/components/messages/CuratedOrderFlowChange' } }
  curatedShipmentChanged:
    address: dfs.shipments.changed.v1
    description: Curated shipment change (feeds dwh.dim_carrier + shipment facts).
    messages: { change: { $ref: '#/components/messages/CuratedOrderFlowChange' } }
  curatedProductInventoryChanged:
    address: dfs.product-inventory.changed.v1
    description: Curated inventory change (feeds dwh.fact_inventory_snap).
    messages: { change: { $ref: '#/components/messages/CuratedOrderFlowChange' } }
  # ---------------------------------------------------------------------------------------------
  # Pipeline self-observation (ADR-0008). Unlike the curated domain events these are JSON, not Avro:
  # ClickHouse Kafka-engine source tables consume them directly as JSONEachRow, so the property names
  # must match the ClickHouse columns exactly. Timestamps cross as epoch milliseconds (event_ms) and
  # each materialized view converts with fromUnixTimestamp64Milli — no datetime-string parsing.
  # ---------------------------------------------------------------------------------------------
  telemetryPipelineEvents:
    address: dfs.telemetry.pipeline_events
    description: >
      Per-stage pipeline latency, produced by the curation and warehouse-sink engines. Ingested
      natively into analytics.pipeline_events_local and rolled up by the pipeline_latency_by_hour
      AggregatingMergeTree MV (p50/p95/p99).
    messages:
      pipelineEvent:
        $ref: '#/components/messages/TelemetryPipelineEvent'
  telemetryCdcLag:
    address: dfs.telemetry.cdc_lag
    description: >
      End-to-end CDC freshness samples (now − Debezium source-commit time), emitted per curated
      record. Ingested natively into analytics.cdc_lag_seconds.
    messages:
      cdcLag:
        $ref: '#/components/messages/TelemetryCdcLag'
  telemetryErrorEvents:
    address: dfs.telemetry.error_events
    description: >
      Structured pipeline failures. Ingested natively into analytics.error_events. Errors that occur
      when the broker itself is unreachable bypass this channel and are inserted directly over
      ClickHouse HTTPS (the control/fallback path — ADR-0008), so an error takes exactly one path.
    messages:
      errorEvent:
        $ref: '#/components/messages/TelemetryErrorEvent'
operations:
  onRawCustomer:
    action: receive
    channel:
      $ref: '#/channels/rawCustomers'
    summary: The curation worker consumes raw Debezium CDC for dbo.Customers.
  publishCuratedCustomer:
    action: send
    channel:
      $ref: '#/channels/curatedCustomerChanged'
    summary: The curation worker publishes the curated CustomerChanged event.
  publishPipelineTelemetry:
    action: send
    channel:
      $ref: '#/channels/telemetryPipelineEvents'
    summary: The curation + warehouse-sink engines publish per-stage latency events.
  publishCdcLag:
    action: send
    channel:
      $ref: '#/channels/telemetryCdcLag'
    summary: The curation engine publishes an end-to-end CDC-lag sample per curated record.
  ingestTelemetryIntoClickHouse:
    action: receive
    channel:
      $ref: '#/channels/telemetryPipelineEvents'
    summary: >
      ClickHouse consumes natively via a Kafka-engine table (principal CN=clickhouse-telemetry,
      consumer group dfs-clickhouse-pipeline-events) — no .NET consumer on this path.
components:
  messages:
    DebeziumCustomerEnvelope:
      name: DebeziumCustomerEnvelope
      title: Debezium CDC envelope (dbo.Customers)
      contentType: application/json
      payload:
        type: object
        properties:
          op:
            type: string
            description: 'r=snapshot, c=create, u=update, d=delete'
          before: { type: [object, 'null'] }
          after:
            type: object
            description: The full row after the change (columns + audit + temporal fields).
          source:
            type: object
            properties:
              lsn: { type: string }
              ts_ms: { type: integer }
    CustomerChanged:
      name: CustomerChanged
      title: Customer changed (curated)
      contentType: application/avro
      payload:
        schemaFormat: application/vnd.apache.avro;version=1.9.0
        schema:
          type: record
          name: CustomerChanged
          namespace: com.nexusplatform.dataflowstudio.curated
          fields:
            - { name: customerId, type: long }
            - { name: customerCode, type: string }
            - { name: displayName, type: string }
            - { name: email, type: string }
            - { name: preferredLocale, type: string }
            - { name: status, type: int }
            - { name: lifetimeValueUsd, type: string }
            - { name: operation, type: string }
            - { name: sourceTsMs, type: long }
            - { name: curatedAtUtc, type: long }
    CuratedOrderFlowChange:
      name: CuratedOrderFlowChange
      title: Curated order-flow change (Avro; per-entity schema)
      contentType: application/avro
      summary: >
        The shape shared by every curated order-flow event: entity-specific business fields
        (decimals as strings, timestamps as epoch-millis longs) followed by the common envelope —
        operation (snapshot/insert/update/delete), sourceTsMs (long), curatedAtUtc (long). The exact
        record for each entity is registered under its '<topic>-value' subject and generated from the
        curation catalog; CustomerChanged above is the fully-expanded example.
      payload:
        schemaFormat: application/vnd.apache.avro;version=1.9.0
        schema:
          type: record
          name: CuratedOrderFlowChange
          namespace: com.nexusplatform.dataflowstudio.curated
          fields:
            - { name: operation, type: string }
            - { name: sourceTsMs, type: long }
            - { name: curatedAtUtc, type: long }
    TelemetryPipelineEvent:
      name: TelemetryPipelineEvent
      title: Pipeline stage event (telemetry)
      contentType: application/json
      summary: >
        One completed pipeline stage. Property names match the analytics.pipeline_events_kafka
        columns exactly (JSONEachRow); the MV converts event_ms to DateTime64(3).
      payload:
        type: object
        required: [event_ms, trace_id, pipeline, stage, status, duration_ms, payload]
        properties:
          event_ms: { type: integer, description: Epoch milliseconds when the stage completed. }
          trace_id: { type: string, description: Correlation id for the run. }
          pipeline: { type: string, description: 'curation | warehouse-sink' }
          stage: { type: string, description: 'Entity or loader stage, e.g. customers, dim_customer, fact_order, drain.' }
          status: { type: string, description: 'ok | error' }
          duration_ms: { type: integer, description: Wall-clock stage duration. }
          payload: { type: string, description: Small JSON blob with stage-specific detail (counts, keys). }
    TelemetryCdcLag:
      name: TelemetryCdcLag
      title: CDC lag sample (telemetry)
      contentType: application/json
      summary: >
        Freshness sample. Property names match analytics.cdc_lag_seconds_kafka.
      payload:
        type: object
        required: [event_ms, source, topic, lag_seconds]
        properties:
          event_ms: { type: integer, description: Epoch milliseconds when the sample was taken. }
          source: { type: string, description: 'Logical source, e.g. oltp.' }
          topic: { type: string, description: The raw CDC topic the change arrived on. }
          lag_seconds: { type: number, description: Seconds between source commit and processing. }
    TelemetryErrorEvent:
      name: TelemetryErrorEvent
      title: Pipeline error (telemetry)
      contentType: application/json
      summary: >
        Structured failure. Property names match analytics.error_events_kafka.
      payload:
        type: object
        required: [event_ms, trace_id, service, error_code, message, stack]
        properties:
          event_ms: { type: integer, description: Epoch milliseconds when the error occurred. }
          trace_id: { type: string }
          service: { type: string, description: 'Emitting stage, e.g. curation, warehouse-sink.' }
          error_code: { type: string, description: 'Stable classification, e.g. projection-failed.' }
          message: { type: string }
          stack: { type: string }
