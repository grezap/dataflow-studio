asyncapi: 3.0.0
info:
  title: DataFlow Studio — CDC Streams
  version: 0.1.0
  description: >
    Kafka topics carrying change-data-capture events from OltpDb, serialized as Avro via the
    Schema Registry (E14 / E16). This is a Week-1 stub of record; concrete channels + Avro payload
    schemas are finalized in the Week-2 CDC → Kafka slice.
  license:
    name: MIT
    url: https://github.com/grezap/dataflow-studio/blob/main/LICENSE
servers:
  kafka-east:
    host: kafka-east.nexus.lab:9092
    protocol: kafka-secure
    description: Primary KRaft cluster (mTLS). Schema Registry at schema-registry.nexus.lab.
defaultContentType: application/avro
channels:
  oltp.customers:
    address: oltp.customers
    description: CDC events for dbo.Customers (insert / update / delete).
    messages:
      customerChanged:
        $ref: "#/components/messages/CustomerChanged"
operations:
  onCustomerChanged:
    action: receive
    channel:
      $ref: "#/channels/oltp.customers"
    summary: A dbo.Customers row changed in OltpDb.
components:
  messages:
    CustomerChanged:
      name: CustomerChanged
      title: Customer changed
      contentType: application/avro
      payload:
        schemaFormat: application/vnd.apache.avro;version=1.9.0
        schema:
          type: record
          name: CustomerChanged
          namespace: com.nexusplatform.dataflowstudio.oltp
          fields:
            - { name: eventId, type: string }
            - { name: occurredUtc, type: { type: long, logicalType: timestamp-millis } }
            - { name: customerId, type: long }
            - { name: customerCode, type: string }
            - { name: operation, type: { type: enum, name: ChangeOperation, symbols: [Insert, Update, Delete] } }
