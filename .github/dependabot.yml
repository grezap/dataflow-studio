version: 2

# The Nexus.* family (nexus-shared, E8) is published to a PRIVATE GitHub Packages feed, which
# nuget.config adds as the `github-nexus` source. Dependabot resolves dependencies with its own
# credentials, so without this block it 401s on that feed and every NuGet update job fails with
# `private_source_authentication_failure` — while `ci` stays green, which makes it easy to miss.
# The token is a Dependabot-scoped secret (a separate store from Actions secrets) holding a classic
# PAT with `read:packages`.
registries:
  github-nexus:
    type: nuget-feed
    url: https://nuget.pkg.github.com/grezap/index.json
    token: ${{secrets.DEPENDABOT_PACKAGES_TOKEN}}

updates:
  - package-ecosystem: nuget
    directory: "/"
    registries:
      - github-nexus
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    # These families must move in lockstep — a partial bump breaks the build, so they
    # are grouped into one PR each rather than updated package-by-package.
    groups:
      # Every Testcontainers package binds to the same core: a module built against a
      # different core version throws MissingMethodException at run time (hit for real
      # when Testcontainers.MsSql lagged the core at 4.1.0 vs 4.13.0).
      testcontainers:
        patterns:
          - "Testcontainers*"
      # dbup-mysql carries a hard dependency on dbup-core.
      dbup:
        patterns:
          - "dbup-*"
      # FluentMigrator.Runner must match FluentMigrator.
      fluentmigrator:
        patterns:
          - "FluentMigrator*"
      # The nexus-shared family is published and versioned together (E8).
      nexus-shared:
        patterns:
          - "Nexus.*"
      # xunit.runner.visualstudio tracks xunit.
      xunit:
        patterns:
          - "xunit*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: chore

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
